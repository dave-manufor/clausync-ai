<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clausync - Contract Intelligence</title>
    <meta property="og:title" content="ClauSync.ai | AI-Powered Contract Monitoring" />
    <meta property="og:description" content="Stop contract surprises before they cost you. ClauSync monitors vendor terms 24/7 with AI-powered risk analysis." />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Stop contract surprises before they cost you. AI-powered contract monitoring." />
    <meta name="twitter:image" content="/og-image.png" />
    <script>
      // Apply saved theme immediately to prevent flash
      (function() {
        try {
          var stored = localStorage.getItem('ui-storage');
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed.state && parsed.state.theme) {
              document.documentElement.classList.remove('light', 'dark');
              document.documentElement.classList.add(parsed.state.theme);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
