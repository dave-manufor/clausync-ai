version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: clausync
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: clausync_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clausync -d clausync_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GCP_PROJECT_ID=clausync-dev
      - DATABASE_URL=postgresql://clausync:localdev@postgres:5432/clausync_db
      - REDIS_URL=redis://redis:6379
      - PUBSUB_TOPIC_SCRAPE=cmd.scrape_url
      - IDENTITY_PLATFORM_AUDIENCE=clausync-dev
      - GCS_BUCKET_NAME=local-snapshots
      - REPORTS_BUCKET_NAME=clausync-reports
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/src
          target: /app/src
        - action: rebuild
          path: ./apps/api/package.json

volumes:
  pg_data:
